<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <meta name="theme-color" content="#f5f6fb">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  <title>周末计划转盘</title>
  <link rel="stylesheet" href="./styles.css">
</head>
<body class="page-home">
  <div class="app-shell">
    <div class="page-shell">
      <header class="page-header glass-card">
        <div class="page-title-group">
          <p class="eyebrow">Weekend Planner</p>
          <h1 id="wheelTitle">周末计划转盘</h1>
          <p class="page-copy">轻量、跨平台、移动端友好的周末抽选工具。</p>
        </div>
        <div class="segmented-control" aria-label="抽取模式">
          <button type="button" class="segment-button is-active" data-mode="repeat">可重复抽取</button>
          <button type="button" class="segment-button" data-mode="no-repeat">本轮不重复</button>
        </div>
      </header>

      <main class="page-grid">
        <section class="glass-card wheel-card">
          <div class="hero-row">
            <div>
              <p class="section-label">Today&apos;s Spin</p>
              <h2>开始你的周末安排</h2>
            </div>
            <div class="pill-row" id="wheelSummary" aria-live="polite"></div>
          </div>

          <div class="wheel-stage" aria-label="周末计划转盘">
            <div class="wheel-pointer" aria-hidden="true"></div>
            <div class="wheel-rotor" id="wheelRotor">
              <svg class="wheel-svg" id="wheelSvg" viewBox="0 0 100 100" role="img" aria-label="计划转盘"></svg>
            </div>
          </div>

          <p class="status-banner" id="statusBanner" aria-live="polite"></p>

          <div class="action-stack">
            <button type="button" id="spinButton" class="action-button action-primary">开始旋转</button>
            <div class="secondary-actions">
              <button type="button" id="resetRoundButton" class="action-button action-secondary">重置本轮</button>
              <a href="./settings.html" class="action-button action-link">进入设置</a>
            </div>
          </div>
        </section>

        <aside class="side-stack">
          <section class="glass-card result-card">
            <div class="hero-row compact">
              <div>
                <p class="section-label">Latest Pick</p>
                <h2>最近结果</h2>
              </div>
            </div>
            <div class="result-highlight" id="latestResult" aria-live="polite">还没有抽取结果</div>
            <ul class="results-list" id="resultsList" aria-label="最近抽取记录"></ul>
          </section>

          <section class="glass-card stats-card">
            <div class="hero-row compact">
              <div>
                <p class="section-label">Pool Status</p>
                <h2>当前池子</h2>
              </div>
            </div>
            <div class="stats-grid">
              <div class="stat-chip">
                <span class="stat-label">总项目</span>
                <strong id="totalCount">0</strong>
              </div>
              <div class="stat-chip">
                <span class="stat-label">启用中</span>
                <strong id="enabledCount">0</strong>
              </div>
              <div class="stat-chip">
                <span class="stat-label">本轮可抽</span>
                <strong id="availableCount">0</strong>
              </div>
            </div>
            <p class="support-copy">设置页中的改动会自动保存。需要调整计划项时，直接进入设置即可。</p>
          </section>
        </aside>
      </main>
    </div>
  </div>

  <div class="modal-backdrop" id="resultModal" hidden>
    <div class="result-modal glass-card" role="dialog" aria-modal="true" aria-labelledby="resultModalTitle">
      <p class="eyebrow">Spin Result</p>
      <h2 id="resultModalTitle">周末安排已抽中</h2>
      <p class="result-modal-text" id="resultModalText">完整结果会显示在这里。</p>
      <div class="result-modal-actions">
        <button type="button" class="action-button action-primary" id="resultModalClose">知道了</button>
      </div>
    </div>
  </div>

  <script src="./storage.js"></script>
  <script src="./wheel.js"></script>
  <script src="./app.js"></script>
</body>
</html>
