<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <meta name="theme-color" content="#f5f6fb">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  <title>调整转盘选项</title>
  <link rel="stylesheet" href="./styles.css">
</head>
<body class="page-settings">
  <div class="app-shell">
    <div class="page-shell settings-shell">
      <header class="page-header glass-card">
        <div class="page-title-group">
          <p class="eyebrow">Wheel Settings</p>
          <h1>调整转盘选项</h1>
          <p class="page-copy">管理项目、权重与数据文件，所有修改都会自动保存。</p>
        </div>
        <div class="header-actions">
          <a href="./index.html" class="action-button action-link">返回转盘</a>
        </div>
      </header>

      <main class="settings-grid">
        <section class="glass-card config-card">
          <div class="hero-row compact">
            <div>
              <p class="section-label">General</p>
              <h2>基础设置</h2>
            </div>
          </div>

          <label class="field-block">
            <span class="field-label">转盘标题</span>
            <input id="titleInput" class="text-input" type="text" maxlength="24" placeholder="周末计划转盘">
          </label>

          <div class="field-block">
            <span class="field-label">默认抽取模式</span>
            <div class="segmented-control" aria-label="默认抽取模式">
              <button type="button" class="segment-button is-active" data-mode="repeat">可重复抽取</button>
              <button type="button" class="segment-button" data-mode="no-repeat">本轮不重复</button>
            </div>
          </div>

          <p class="support-copy" id="settingsSummary">正在读取当前配置。</p>
        </section>

        <section class="glass-card list-card">
          <div class="hero-row compact">
            <div>
              <p class="section-label">Items</p>
              <h2>计划项目</h2>
            </div>
            <button type="button" id="addItemButton" class="action-button action-secondary">新增项目</button>
          </div>

          <div id="itemsList" class="item-list" aria-live="polite"></div>
        </section>

        <section class="glass-card tools-card">
          <div class="hero-row compact">
            <div>
              <p class="section-label">Data</p>
              <h2>导入与导出</h2>
            </div>
          </div>

          <div class="tool-row">
            <button type="button" id="restoreDefaultsButton" class="action-button action-secondary">恢复默认</button>
            <button type="button" id="exportButton" class="action-button action-secondary">导出 JSON</button>
            <button type="button" id="importButton" class="action-button action-secondary">导入 JSON</button>
            <input id="importInput" type="file" accept="application/json,.json" hidden>
          </div>

          <p class="status-banner compact" id="toolsStatus" aria-live="polite">导出会下载当前配置，导入会覆盖当前配置。</p>
        </section>
      </main>
    </div>
  </div>

  <script src="./storage.js"></script>
  <script src="./settings.js"></script>
</body>
</html>
